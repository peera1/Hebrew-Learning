<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משחק האלף-בית 🌟</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Fredoka+One&display=swap');
  :root {
    --primary:#FF6B35; --secondary:#7B2FBE; --accent:#00BCD4;
    --correct:#4CAF50; --wrong:#E53935; --text-dark:#2c1810;
    --shadow:0 8px 32px rgba(0,0,0,0.13);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Heebo',sans-serif;background:linear-gradient(180deg,#a8edea 0%,#87CEEB 40%,#c8f5c8 100%);min-height:100vh;overflow-x:hidden;position:relative}
  .bg-scene{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
  .sun{position:absolute;top:18px;right:40px;width:80px;height:80px;background:radial-gradient(circle,#FFE066 60%,#FFD700 100%);border-radius:50%;box-shadow:0 0 40px 10px #FFE06688;animation:sunPulse 3s ease-in-out infinite}
  @keyframes sunPulse{0%,100%{box-shadow:0 0 40px 10px #FFE06688}50%{box-shadow:0 0 60px 20px #FFD70099}}
  .cloud{position:absolute;background:white;border-radius:50px;opacity:0.85;animation:floatCloud linear infinite}
  .cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%}
  .cloud1{width:120px;height:40px;top:60px;left:-140px;animation-duration:22s}
  .cloud1::before{width:60px;height:55px;top:-25px;left:15px}
  .cloud1::after{width:45px;height:40px;top:-18px;left:55px}
  .cloud2{width:90px;height:30px;top:110px;left:-110px;animation-duration:30s;animation-delay:-12s}
  .cloud2::before{width:45px;height:40px;top:-18px;left:10px}
  .cloud2::after{width:35px;height:30px;top:-12px;left:40px}
  .cloud3{width:150px;height:45px;top:30px;left:-170px;animation-duration:26s;animation-delay:-7s}
  .cloud3::before{width:70px;height:60px;top:-28px;left:20px}
  .cloud3::after{width:55px;height:45px;top:-20px;left:70px}
  @keyframes floatCloud{from{transform:translateX(0)}to{transform:translateX(110vw)}}
  .grass-strip{position:fixed;bottom:0;left:0;width:100%;height:70px;background:linear-gradient(180deg,#7EC850 0%,#5a9e2f 100%);border-radius:50% 50% 0 0/20px 20px 0 0;z-index:0}
  .star{position:fixed;pointer-events:none;font-size:22px;animation:starFloat 4s ease-in-out infinite;opacity:0.7}
  @keyframes starFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(20deg)}}
  #app{position:relative;z-index:10;max-width:700px;margin:0 auto;padding:20px 16px 120px;min-height:100vh;display:flex;flex-direction:column;align-items:center}
  .screen{width:100%;animation:fadeIn 0.4s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .game-header{text-align:center;margin-bottom:14px;width:100%}
  .game-title{font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--secondary);text-shadow:3px 3px 0 #ffd700,5px 5px 0 #ff6b3533;letter-spacing:2px;animation:titleBounce 2s ease-in-out infinite}
  @keyframes titleBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .progress-wrap{width:100%;background:rgba(255,255,255,0.5);border-radius:20px;height:20px;margin:8px 0 4px;border:2px solid rgba(123,47,190,0.2);overflow:hidden}
  .progress-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,#FF6B35,#FFD700,#7B2FBE);background-size:200% 100%;transition:width 0.5s cubic-bezier(.68,-0.55,.27,1.55);animation:shimmer 2s linear infinite}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .progress-label{text-align:center;font-size:0.85rem;color:#5a3e8a;font-weight:700;margin-bottom:6px}
  .lives-row{display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:8px;font-size:1.7rem}
  .heart{transition:transform 0.2s}
  .heart.lost{filter:grayscale(1);opacity:0.35;transform:scale(0.85)}
  .score-badge{background:linear-gradient(135deg,#7B2FBE,#FF6B35);color:white;border-radius:30px;padding:4px 18px;font-weight:900;font-size:1rem;margin-bottom:12px;box-shadow:0 4px 14px #7B2FBE44;display:inline-block}
  .question-card{background:linear-gradient(135deg,#fffde7 60%,#e8f5e9 100%);border-radius:28px;padding:22px 20px 16px;width:100%;box-shadow:var(--shadow);border:3px solid rgba(123,47,190,0.13);margin-bottom:14px;position:relative;overflow:hidden}
  .question-card::before{content:'';position:absolute;top:-30px;left:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,215,0,0.18)}
  .q-type-badge{display:inline-block;border-radius:12px;padding:3px 13px;font-size:0.78rem;font-weight:700;margin-bottom:8px;letter-spacing:0.5px}
  .badge-start{background:#e3f2fd;color:#1565C0}
  .badge-odd{background:#fce4ec;color:#c62828}
  .badge-end{background:#e8f5e9;color:#2e7d32}
  .question-text{font-size:1.5rem;font-weight:900;color:var(--text-dark);margin-bottom:10px;line-height:1.5}
  .question-word{color:var(--secondary);font-size:1.9rem;display:inline-block;margin:0 6px;animation:wordPop 0.5s cubic-bezier(.68,-0.55,.27,1.55)}
  @keyframes wordPop{0%{transform:scale(0.7) rotate(-5deg);opacity:0}100%{transform:scale(1) rotate(0deg);opacity:1}}
  .attempt-dots{display:flex;gap:6px;justify-content:flex-end;margin-bottom:8px}
  .dot{width:13px;height:13px;border-radius:50%;background:#e0d0f5}
  .dot.used{background:#E53935}
  /* Answers */
  .answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
  .answer-wrap{display:flex;flex-direction:column;gap:5px}
  .answer-btn{background:white;border:3px solid #e0d0f5;border-radius:18px;padding:14px 10px;font-size:1.25rem;font-weight:700;color:var(--text-dark);cursor:pointer;transition:all 0.18s;box-shadow:0 4px 14px rgba(123,47,190,0.08);display:flex;flex-direction:column;align-items:center;gap:5px;font-family:'Heebo',sans-serif;position:relative;width:100%}
  .answer-btn:hover:not(:disabled){transform:translateY(-4px) scale(1.04);border-color:var(--primary);box-shadow:0 8px 24px rgba(255,107,53,0.2);background:#fff8f5}

  .answer-btn .word-label{font-size:1rem;color:#444}
  .answer-btn .emoji-label{font-size:1.7rem}
  .answer-btn.correct{background:#e8f5e9!important;border-color:#4CAF50!important;animation:correctPop 0.5s ease}
  .answer-btn.wrong{background:#ffebee!important;border-color:#E53935!important;animation:shake 0.4s ease}
  .answer-btn.disabled-opt{opacity:0.45;pointer-events:none}
  @keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}

  .listen-btn:hover:not(:disabled){background:rgba(123,47,190,0.18);transform:scale(1.04)}
  .listen-btn:disabled{opacity:0.4;cursor:default}
  .listen-btn.speaking{background:rgba(0,188,212,0.18);border-color:#00BCD4;color:#006064;animation:glow 0.5s ease-in-out infinite alternate}
  @keyframes glow{from{box-shadow:0 0 4px rgba(0,188,212,0.3)}to{box-shadow:0 0 14px rgba(0,188,212,0.7)}}
  /* Bottom bar */

  .bar-btn:active{transform:scale(0.95)}

  .next-btn{margin-top:12px;background:linear-gradient(135deg,#00BCD4,#7B2FBE);color:white;border:none;border-radius:40px;padding:13px 40px;font-size:1.15rem;font-weight:900;cursor:pointer;box-shadow:0 6px 20px rgba(123,47,190,0.25);transition:all 0.18s;font-family:'Fredoka One',cursive;display:none}

  .feedback-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:999;pointer-events:none;opacity:0;transition:opacity 0.3s}
  .feedback-overlay.show{opacity:1}
  .feedback-msg{font-size:2.7rem;font-weight:900;padding:16px 32px;border-radius:28px;text-align:center;pointer-events:none;animation:feedbackPop 0.5s cubic-bezier(.68,-0.55,.27,1.55);box-shadow:0 12px 40px rgba(0,0,0,0.18)}

  .feedback-msg.wrong{background:#ffebee;color:#c62828;border:4px solid #E53935}
  @keyframes feedbackPop{0%{transform:scale(0.5) rotate(-10deg)}70%{transform:scale(1.1) rotate(3deg)}100%{transform:scale(1) rotate(0deg)}}

  .confetti-piece{position:absolute;width:12px;height:12px;border-radius:2px;animation:confettiFall linear forwards}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
  /* Start */
  .start-screen{text-align:center;padding:30px 20px}
  .start-hero{font-size:5rem;margin-bottom:10px;animation:heroFloat 2s ease-in-out infinite}
  @keyframes heroFloat{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-15px) rotate(5deg)}}
  .start-title{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--secondary);text-shadow:3px 3px 0 #ffd700;margin-bottom:8px}
  .start-desc{font-size:1.1rem;color:#444;margin-bottom:24px;line-height:1.6}
  .info-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0 28px}
  .info-card{background:white;border-radius:16px;padding:14px 8px;box-shadow:0 4px 14px rgba(0,0,0,0.08);border:2px solid #f0e6ff}
  .info-card .ic-icon{font-size:2rem;margin-bottom:4px}
  .info-card .ic-text{font-size:0.85rem;color:#444;font-weight:700}
  .start-btn{background:linear-gradient(135deg,#FF6B35,#e91e8c);color:white;border:none;border-radius:50px;padding:18px 50px;font-size:1.5rem;font-weight:900;cursor:pointer;box-shadow:0 8px 24px rgba(255,107,53,0.4);transition:all 0.18s;font-family:'Fredoka One',cursive;letter-spacing:1px}
  .start-btn:hover{transform:translateY(-3px) scale(1.05)}
  /* End */
  .end-screen{text-align:center;padding:10px 0 30px}
  .end-hero{font-size:4rem;margin-bottom:6px}
  .end-title{font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--secondary);text-shadow:2px 2px 0 #ffd700;margin-bottom:6px}
  .end-score-big{font-size:3.5rem;font-weight:900;color:var(--primary);margin:10px 0}
  .end-msg{font-size:1.1rem;color:#444;margin-bottom:20px}
  .summary-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0}
  .sum-card{background:white;border-radius:16px;padding:14px 8px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,0.08);border:2px solid #f0e6ff}
  .sum-card .sc-val{font-size:2rem;font-weight:900;color:var(--secondary)}
  .sum-card .sc-label{font-size:0.8rem;color:#666;font-weight:700}
  .results-section{width:100%;margin-top:16px}
  .results-title{font-size:1.2rem;font-weight:900;color:var(--secondary);margin-bottom:10px;text-align:right}
  .results-table-wrap{overflow-x:auto;border-radius:16px;box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse;background:white;border-radius:16px;overflow:hidden;font-size:0.9rem}
  thead tr{background:linear-gradient(135deg,#7B2FBE,#FF6B35);color:white}
  th{padding:12px 8px;text-align:center;font-weight:700;white-space:nowrap}
  tbody tr:nth-child(even){background:#fafafa}
  tbody tr:hover{background:#f3e5ff}
  td{padding:10px 8px;text-align:center;border-bottom:1px solid #f0e6ff}
  td.correct-cell{color:#2e7d32;font-weight:700}
  td.wrong-cell{color:#c62828;font-weight:700}
  .restart-btn{background:linear-gradient(135deg,#7B2FBE,#00BCD4);color:white;border:none;border-radius:50px;padding:16px 44px;font-size:1.3rem;font-weight:900;cursor:pointer;box-shadow:0 8px 24px rgba(123,47,190,0.3);transition:all 0.18s;margin-top:20px;font-family:'Fredoka One',cursive}
  .restart-btn:hover{transform:translateY(-3px) scale(1.04)}
  @media(max-width:500px){
    .game-title{font-size:1.9rem}.question-text{font-size:1.1rem}
    .answer-btn{font-size:1rem;padding:10px 6px}.answers-grid{gap:8px}
    .bottom-bar{gap:7px;padding:8px 8px 14px}.bar-btn{padding:9px 14px;font-size:0.88rem}
    table{font-size:0.75rem}th,td{padding:6px 3px}
  }
</style>
</head>
<body>

<div class="bg-scene">
  <div class="sun"></div><div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div><div class="cloud cloud3"></div>
  <div class="grass-strip"></div>
</div>
<div class="star" style="top:12%;left:5%;animation-delay:0s">⭐</div>
<div class="star" style="top:20%;left:88%;animation-delay:1s">🌟</div>

<div id="app">

  <div id="startScreen" class="screen start-screen">

    📢 קרא הכל
  </button>

<script>
// ============================================================
//  SPEECH ENGINE - robust Hebrew TTS
// ============================================================
let activeSpeakEl = null;
let voicesLoaded = false;
let hebrewVoice = null;

function loadVoices() {
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  hebrewVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('he')) || null;
  if (voices.length > 0) voicesLoaded = true;
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function stopSpeech() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if (activeSpeakEl) { activeSpeakEl.classList.remove('speaking'); activeSpeakEl = null; }
}

function speakText(text, onDone, highlightEl) {
  if (!window.speechSynthesis) { if(onDone) onDone(); return; }
  stopSpeech();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'he-IL';
  u.rate = 0.75;
  u.pitch = 1.2;
  u.volume = 1;
  if (hebrewVoice) u.voice = hebrewVoice;
  if (highlightEl) {
    activeSpeakEl = highlightEl;
    highlightEl.classList.add('speaking');
  }
  u.onend = u.onerror = () => {
    if (highlightEl) highlightEl.classList.remove('speaking');
    if (activeSpeakEl === highlightEl) activeSpeakEl = null;
    if (onDone) onDone();
  };
  window.speechSynthesis.speak(u);
}

// Queue: array of {text, pause, el}
let speechQueue = [];
let speakingQueue = false;

function enqueueSpeech(items, onAllDone) {
  stopSpeech();
  speechQueue = [...items];
  speakingQueue = true;
  processQueue(onAllDone);
}

function processQueue(onAllDone) {
  if (!speechQueue.length) { speakingQueue = false; if(onAllDone) onAllDone(); return; }
  const item = speechQueue.shift();
  speakText(item.text, () => {
    setTimeout(() => processQueue(onAllDone), item.pause || 350);
  }, item.el || null);
}

function soundGood() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [523,659,784].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type='sine';
      const t=ctx.currentTime+i*0.12;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.18,t+0.05);g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      o.start(t);o.stop(t+0.3);
    });
  } catch(e){}
}
function soundBad() {
  try {
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=200;o.type='triangle';
    g.gain.setValueAtTime(0.2,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    o.start();o.stop(ctx.currentTime+0.4);
  } catch(e){}
}

// ============================================================
//  DATA
// ============================================================
const LETTERS=['א','ב','ג','ד','ה','ו','ז','ח','ט','י','כ','ל','מ','נ','ס','ע','פ','צ','ק','ר','ש','ת'];
const LN={
  'א':'אלף','ב':'בית','ג':'גימל','ד':'דלת','ה':'הא','ו':'וו','ז':'זיין','ח':'חית','ט':'טית','י':'יוד',
  'כ':'כף','ל':'למד','מ':'מם','נ':'נון','ס':'סמך','ע':'עין','פ':'פה','צ':'צדי','ק':'קוף','ר':'ריש','ש':'שין','ת':'תו'
};

const W=[

// ============================================================
//  GENERATORS
// ============================================================
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function genStart(){
  const correct=W[Math.floor(Math.random()*W.length)];
  const tl=correct.s;
  const opts=shuffle([correct,...shuffle(W.filter(x=>x.s!==tl)).slice(0,3)]);
  return {
    type:'start',typeName:'מה מתחיל באות',
    html:`מה מתחיל באות <span class="question-word">${tl}</span>?`,
    spokenQ:`מה מתחיל באות ${LN[tl]}?`,
    spokenCorrect:`נכון! המילה ${correct.w} מתחילה באות ${LN[tl]}`,
    opts:opts.map(o=>({label:o.w,sub:'',emoji:o.e,spoken:o.w,correct:o===correct})),
    detail:`האות ${LN[tl]}`
  };
}

function genOdd(){
  const groups={};
  W.forEach(x=>{if(!groups[x.s])groups[x.s]=[];groups[x.s].push(x);});
  const valid=Object.keys(groups).filter(l=>groups[l].length>=3);
  const ml=valid[Math.floor(Math.random()*valid.length)];
  const three=shuffle([...groups[ml]]).slice(0,3);
  const otherL=Object.keys(groups).filter(l=>l!==ml);
  const oddL=otherL[Math.floor(Math.random()*otherL.length)];
  const odd=groups[oddL][Math.floor(Math.random()*groups[oddL].length)];
  const opts=shuffle([...three,odd]);
  return {
    type:'odd',typeName:'מה יוצא דופן',
    html:`🔍 איזו מילה <span class="question-word">לא</span> מתחילה באותה אות?`,
    spokenQ:`שלוש מילות מתחילות באות ${LN[ml]}, ואחת שונה. מצא את המילה שיוצאת דופן!`,
    spokenCorrect:`נכון! שלוש מילים מתחילות באות ${LN[ml]}: ${three.map(x=>x.w).join(', ')}, ורק המילה ${odd.w} מתחילה באות ${LN[oddL]}`,
    opts:opts.map(o=>({label:o.w,sub:'',emoji:o.e,spoken:o.w,correct:o===odd})),
    detail:`${odd.w} מתחילה ב-${odd.s}`
  };
}

function genEnd(){
  const word=W[Math.floor(Math.random()*W.length)];
  const cl=word.n;
  const opts=shuffle([cl,...shuffle(LETTERS.filter(l=>l!==cl)).slice(0,3)]);
  return {
    type:'end',typeName:'באיזה אות מסתיימת',
    html:`באיזו אות מסתיימת המילה <span class="question-word">${word.e} ${word.w}</span>?`,
    spokenQ:`באיזו אות מסתיימת המילה ${word.w}?`,
    spokenCorrect:`נכון! המילה ${word.w} מסתיימת באות ${LN[cl]}`,
    opts:opts.map(l=>({label:l,sub:LN[l]||l,emoji:'',spoken:LN[l]||l,correct:l===cl})),
    detail:`האות ${LN[cl]}`
  };
}

function generateQ(){const r=Math.random();return r<0.4?genStart():r<0.7?genOdd():genEnd();}

// ============================================================
//  GAME STATE
// ============================================================
let questions=[],current=0,lives=3,score=0;
let attempts=0,answered=false;
let results=[];
let cq=null; // current question

function startGame(){
  questions=[];for(let i=0;i<10;i++)questions.push(generateQ());
  current=0;lives=3;score=0;results=[];
  show('gameScreen');
  document.getElementById('bottomBar').style.display='flex';
  renderLives();renderQ();
}

function show(id){
  ['startScreen','gameScreen','endScreen'].forEach(s=>document.getElementById(s).style.display=s===id?'block':'none');
  if(id!=='gameScreen')document.getElementById('bottomBar').style.display='none';
}

function renderLives(){
  const row=document.getElementById('livesRow');row.innerHTML='';
  for(let i=0;i<3;i++){const h=document.createElement('span');h.className='heart'+(i>=lives?' lost':'');h.textContent='❤️';row.appendChild(h);}
}

// ============================================================
//  RENDER QUESTION
// ============================================================
function renderQ(){
  cq=questions[current];attempts=0;answered=false;
  document.getElementById('nextBtn').classList.remove('visible');
  document.getElementById('progressBar').style.width=(current/10*100)+'%';
  document.getElementById('progressLabel').textContent=`שאלה ${current+1} מתוך 10`;
  document.getElementById('scoreDisplay').textContent=score;

  const area=document.getElementById('questionArea');area.innerHTML='';

  // Card
  const card=document.createElement('div');card.className='question-card';
  const badge=document.createElement('div');
  badge.className='q-type-badge '+(cq.type==='start'?'badge-start':cq.type==='odd'?'badge-odd':'badge-end');
  badge.textContent=cq.type==='start'?'🔤 איזו מילה?':cq.type==='odd'?'🔍 יוצא דופן':'🔡 איזו אות?';
  card.appendChild(badge);

  const dots=document.createElement('div');dots.className='attempt-dots';dots.id='attemptDots';
  for(let i=0;i<3;i++){const d=document.createElement('div');d.className='dot';dots.appendChild(d);}
  card.appendChild(dots);

  const qt=document.createElement('div');qt.className='question-text';qt.innerHTML=cq.html;
  card.appendChild(qt);
  area.appendChild(card);

  // Grid
  const grid=document.createElement('div');grid.className='answers-grid';grid.id='answersGrid';

  cq.opts.forEach((opt,idx)=>{
    const wrap=document.createElement('div');wrap.className='answer-wrap';

    // Answer button
    const btn=document.createElement('button');btn.className='answer-btn';btn.dataset.idx=idx;
    if(opt.emoji){const em=document.createElement('div');em.className='emoji-label';em.textContent=opt.emoji;btn.appendChild(em);}
    const lbl=document.createElement('div');lbl.className='word-label';lbl.style.fontSize=cq.type==='end'?'2.4rem':'1.1rem';
    lbl.style.fontWeight='900';lbl.textContent=opt.label;btn.appendChild(lbl);
    if(opt.sub&&cq.type==='end'){const sl=document.createElement('div');sl.className='word-label';sl.style.fontSize='0.9rem';sl.textContent=opt.sub;btn.appendChild(sl);}
    btn.addEventListener('click',()=>handleAnswer(btn,opt.correct));
    wrap.appendChild(btn);

    // Listen button — SEPARATE, below the answer card
    const lb=document.createElement('button');lb.className='listen-btn';
    lb.innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> <span>${opt.spoken}</span>`;
    lb.addEventListener('click',(e)=>{e.stopPropagation();speakText(opt.spoken,null,lb);});
    wrap.appendChild(lb);

    grid.appendChild(wrap);
  });
  area.appendChild(grid);

  // Auto-read question after short pause
  setTimeout(autoRead, 600);
}

function autoRead(){
  if(!cq) return;
  speakText(cq.spokenQ, null, document.getElementById('btnRepeat'));
}

function repeatQuestion(){
  if(!cq) return;
  speakText(cq.spokenQ, null, document.getElementById('btnRepeat'));
}

function readEverything(){
  if(!cq) return;
  const allBtn=document.getElementById('btnAll');
  const items=[
    {text:cq.spokenQ, pause:500, el:allBtn},
    {text:'האפשרויות הן:', pause:300},
  ];
  cq.opts.forEach((o,i)=>{
    items.push({text:`אפשרות ${['אחת','שתיים','שלוש','ארבע'][i]}: ${o.spoken}`, pause:450});
  });
  enqueueSpeech(items);
}

// ============================================================
//  ANSWER HANDLING
// ============================================================
function handleAnswer(btn, isCorrect){
  if(answered) return;
  if(isCorrect){
    btn.classList.add('correct');
    disableAll();answered=true;
    const pts=Math.max(10,30-attempts*10);score+=pts;
    document.getElementById('scoreDisplay').textContent=score;
    results.push({num:current+1,type:cq.typeName,word:cq.opts.find(o=>o.correct)?.label||'',correct:true,attempts:attempts+1,detail:cq.detail||''});
    soundGood();
    const msgs=['כל הכבוד! מדהים!','נכון לגמרי! יופי!','וואו! אתה גאון!','מושלם! ממש טוב!','נכון! כל הכבוד!'];
    const m=msgs[Math.floor(Math.random()*msgs.length)];
    showFeedback(true,m);
    // Speak the specific correct-answer explanation instead of the generic praise
    setTimeout(()=>speakText(cq.spokenCorrect),400);
    launchConfetti();
    setTimeout(()=>document.getElementById('nextBtn').classList.add('visible'),800);
  } else {
    attempts++;btn.classList.add('wrong');btn.disabled=true;
    const wrap=btn.closest('.answer-wrap');
    if(wrap){const lb=wrap.querySelector('.listen-btn');if(lb)lb.disabled=true;}
    updateDots();soundBad();
    if(attempts>=3){
      lives--;renderLives();disableAll();answered=true;
      results.push({num:current+1,type:cq.typeName,word:cq.opts.find(o=>o.correct)?.label||'',correct:false,attempts:3,detail:cq.detail||''});
      const msgs=['אופס! לא הצלחת הפעם.','שגוי. בפעם הבאה תצליח!','לא נכון, ממשיכים הלאה!'];
      const m=msgs[Math.floor(Math.random()*msgs.length)];
      showFeedback(false,m);setTimeout(()=>speakText(m),400);
      setTimeout(()=>document.getElementById('nextBtn').classList.add('visible'),800);
      if(lives<=0)setTimeout(endGame,2100);
    } else {
      const msgs=['נסה שוב!','לא מדויק — נסה עוד פעם!','כמעט! נסה שוב!'];
      const m=msgs[Math.floor(Math.random()*msgs.length)];
      showFeedback(false,m,true);setTimeout(()=>speakText(m),200);
    }
  }
}

function updateDots(){document.querySelectorAll('#attemptDots .dot').forEach((d,i)=>{if(i<attempts)d.classList.add('used');});}
function disableAll(){
  document.querySelectorAll('#answersGrid .answer-btn').forEach(b=>{b.disabled=true;b.classList.add('disabled-opt');});
  document.querySelectorAll('#answersGrid .listen-btn').forEach(b=>{b.disabled=true;});
}

function showFeedback(ok,text,tmp=false){
  const ov=document.getElementById('feedbackOverlay'),msg=document.getElementById('feedbackMsg');
  msg.textContent=text;msg.className='feedback-msg '+(ok?'correct':'wrong');
  ov.classList.add('show');setTimeout(()=>ov.classList.remove('show'),tmp?900:1400);
}

function nextQuestion(){
  current++;
  if(current>=10||lives<=0){endGame();return;}
  renderQ();
}

// ============================================================
//  END GAME
// ============================================================
function endGame(){
  stopSpeech();
  document.getElementById('progressBar').style.width='100%';
  show('endScreen');
  buildEnd();
}

function buildEnd(){
  const tot=results.length;
  const ok=results.filter(r=>r.correct).length;
  const pct=Math.round(ok/Math.max(1,tot)*100);
  let hero,title,msg;
  if(pct===100){hero='🥇';title='מושלם לגמרי!';msg='ענית נכון על כל השאלות! אתה אלוף האלף-בית!';}
  else if(pct>=80){hero='🌟';title='עבודה מצוינת!';msg='כמעט מושלם! ממשיכים להתאמן!';}
  else if(pct>=60){hero='😊';title='יפה מאוד!';msg='לא רע כלל! קצת עוד תרגול ותגיע למושלם!';}
  else{hero='💪';title='ממשיכים להתאמן!';msg='אל תוותר! כל תרגול עושה אותך יותר טוב!';}
  document.getElementById('endHero').textContent=hero;
  document.getElementById('endTitle').textContent=title;
  document.getElementById('finalScore').textContent=score;
  document.getElementById('endMsg').textContent=msg;
  setTimeout(()=>speakText(`${title} ${msg} קיבלת ${score} נקודות!`),700);

  const bad=tot-ok;
  const avg=(results.reduce((s,r)=>s+r.attempts,0)/Math.max(1,tot)).toFixed(1);
  document.getElementById('summaryCards').innerHTML=`
    <div class="sum-card"><div class="sc-val" style="color:#2e7d32">✅ ${ok}</div><div class="sc-label">נכון</div></div>
    <div class="sum-card"><div class="sc-val" style="color:#c62828">❌ ${bad}</div><div class="sc-label">לא נכון</div></div>
    <div class="sum-card"><div class="sc-val">${pct}%</div><div class="sc-label">הצלחה</div></div>
  `;
  document.getElementById('resultsTable').innerHTML=`
    <thead><tr><th>#</th><th>סוג שאלה</th><th>מילה/אות</th><th>פרט</th><th>תשובה</th><th>ניסיונות</th><th>נקודות</th></tr></thead>
    <tbody>
    ${results.map(r=>`<tr><td><b>${r.num}</b></td><td>${r.type}</td><td><b>${r.word}</b></td><td>${r.detail||'-'}</td>
    <td class="${r.correct?'correct-cell':'wrong-cell'}">${r.correct?'✅ נכון':'❌ שגוי'}</td>
    <td>${r.attempts}</td><td>${r.correct?Math.max(10,30-(r.attempts-1)*10):0} ⭐</td></tr>`).join('')}
    <tr style="background:#f3e5ff;font-weight:900;"><td colspan="4"><b>סה"כ</b></td><td><b>${ok}/${tot}</b></td><td><b>ממוצע: ${avg}</b></td><td><b>${score} ⭐</b></td></tr>
    </tbody>`;
}

// ============================================================
//  CONFETTI
// ============================================================
function launchConfetti(){
  const c=document.getElementById('confettiContainer');
  const cols=['#FF6B35','#FFD700','#7B2FBE','#00BCD4','#4CAF50','#E91E8C'];
  for(let i=0;i<32;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'%';p.style.background=cols[Math.floor(Math.random()*cols.length)];
    p.style.transform=`rotate(${Math.random()*360}deg)`;
    p.style.animationDuration=(1.2+Math.random()*1.5)+'s';p.style.animationDelay=Math.random()*0.4+'s';
    p.style.borderRadius=Math.random()>0.5?'50%':'3px';
    c.appendChild(p);setTimeout(()=>p.remove(),3000);
  }
}
