<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משחק האלף-בית 🌟</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Fredoka+One&display=swap');

  :root {
    --sky: #87CEEB;
    --sun: #FFD700;
    --grass: #7EC850;
    --cloud: #ffffff;
    --card-bg: #fffde7;
    --correct: #4CAF50;
    --wrong: #E53935;
    --primary: #FF6B35;
    --secondary: #7B2FBE;
    --accent: #00BCD4;
    --text-dark: #2c1810;
    --shadow: 0 8px 32px rgba(0,0,0,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: linear-gradient(180deg, #a8edea 0%, #87CEEB 40%, #c8f5c8 100%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background */
  .bg-scene {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .sun {
    position: absolute; top: 18px; right: 40px;
    width: 80px; height: 80px;
    background: radial-gradient(circle, #FFE066 60%, #FFD700 100%);
    border-radius: 50%;
    box-shadow: 0 0 40px 10px #FFE06688;
    animation: sunPulse 3s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%,100% { box-shadow: 0 0 40px 10px #FFE06688; }
    50% { box-shadow: 0 0 60px 20px #FFD70099; }
  }
  .cloud {
    position: absolute; background: white; border-radius: 50px;
    opacity: 0.85;
    animation: floatCloud linear infinite;
  }
  .cloud::before, .cloud::after {
    content: ''; position: absolute; background: white; border-radius: 50%;
  }
  .cloud1 { width: 120px; height: 40px; top: 60px; left: -140px; animation-duration: 22s; animation-delay: 0s; }
  .cloud1::before { width: 60px; height: 55px; top: -25px; left: 15px; }
  .cloud1::after { width: 45px; height: 40px; top: -18px; left: 55px; }
  .cloud2 { width: 90px; height: 30px; top: 110px; left: -110px; animation-duration: 30s; animation-delay: -12s; }
  .cloud2::before { width: 45px; height: 40px; top: -18px; left: 10px; }
  .cloud2::after { width: 35px; height: 30px; top: -12px; left: 40px; }
  .cloud3 { width: 150px; height: 45px; top: 30px; left: -170px; animation-duration: 26s; animation-delay: -7s; }
  .cloud3::before { width: 70px; height: 60px; top: -28px; left: 20px; }
  .cloud3::after { width: 55px; height: 45px; top: -20px; left: 70px; }
  @keyframes floatCloud {
    from { transform: translateX(0); }
    to { transform: translateX(110vw); }
  }
  .grass-strip {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
    background: linear-gradient(180deg, #7EC850 0%, #5a9e2f 100%);
    border-radius: 50% 50% 0 0 / 20px 20px 0 0;
    z-index: 0;
  }

  /* Stars floating */
  .star {
    position: fixed; pointer-events: none; font-size: 22px;
    animation: starFloat 4s ease-in-out infinite;
    opacity: 0.7;
  }
  @keyframes starFloat {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-18px) rotate(20deg); }
  }

  /* Main container */
  #app {
    position: relative; z-index: 10;
    max-width: 700px; margin: 0 auto;
    padding: 20px 16px 100px;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }

  /* Header */
  .game-header {
    text-align: center; margin-bottom: 18px; width: 100%;
  }
  .game-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.6rem; color: var(--secondary);
    text-shadow: 3px 3px 0 #ffd700, 5px 5px 0 #ff6b3533;
    letter-spacing: 2px;
    animation: titleBounce 2s ease-in-out infinite;
  }
  @keyframes titleBounce {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  .game-subtitle {
    font-size: 1.1rem; color: #5a3e8a; margin-top: 4px; font-weight: 700;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%; background: rgba(255,255,255,0.5);
    border-radius: 20px; height: 22px; margin: 10px 0 6px;
    border: 2px solid rgba(123,47,190,0.2);
    overflow: hidden; position: relative;
  }
  .progress-bar {
    height: 100%; border-radius: 20px;
    background: linear-gradient(90deg, #FF6B35, #FFD700, #7B2FBE);
    background-size: 200% 100%;
    transition: width 0.5s cubic-bezier(.68,-0.55,.27,1.55);
    animation: shimmer 2s linear infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .progress-label {
    text-align: center; font-size: 0.88rem; color: #5a3e8a; font-weight: 700; margin-bottom: 8px;
  }

  /* Lives */
  .lives-row {
    display: flex; gap: 8px; align-items: center; justify-content: center;
    margin-bottom: 10px; font-size: 1.7rem;
  }
  .heart { transition: transform 0.2s; }
  .heart.lost { filter: grayscale(1); opacity: 0.35; transform: scale(0.85); }

  /* Score */
  .score-badge {
    background: linear-gradient(135deg, #7B2FBE, #FF6B35);
    color: white; border-radius: 30px; padding: 4px 18px;
    font-weight: 900; font-size: 1rem; margin-bottom: 14px;
    box-shadow: 0 4px 14px #7B2FBE44;
    display: inline-block;
  }

  /* Question card */
  .question-card {
    background: linear-gradient(135deg, #fffde7 60%, #e8f5e9 100%);
    border-radius: 28px; padding: 28px 24px 20px;
    width: 100%; box-shadow: var(--shadow);
    border: 3px solid rgba(123,47,190,0.13);
    margin-bottom: 18px;
    position: relative; overflow: hidden;
  }
  .question-card::before {
    content: ''; position: absolute; top: -30px; left: -30px;
    width: 100px; height: 100px; border-radius: 50%;
    background: rgba(255,215,0,0.18);
  }
  .q-type-badge {
    display: inline-block; border-radius: 12px; padding: 3px 13px;
    font-size: 0.78rem; font-weight: 700; margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .badge-start { background: #e3f2fd; color: #1565C0; }
  .badge-odd { background: #fce4ec; color: #c62828; }
  .badge-end { background: #e8f5e9; color: #2e7d32; }

  .question-text {
    font-size: 1.55rem; font-weight: 900; color: var(--text-dark);
    margin-bottom: 6px; line-height: 1.5;
    font-family: 'Heebo', sans-serif;
  }
  .question-word {
    color: var(--secondary); font-size: 2rem;
    display: inline-block; margin: 0 6px;
    animation: wordPop 0.5s cubic-bezier(.68,-0.55,.27,1.55);
  }
  @keyframes wordPop {
    0% { transform: scale(0.7) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* Answer grid */
  .answers-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px; width: 100%;
  }
  .answer-btn {
    background: white;
    border: 3px solid #e0d0f5;
    border-radius: 20px; padding: 16px 10px;
    font-size: 1.35rem; font-weight: 700; color: var(--text-dark);
    cursor: pointer; transition: all 0.18s;
    box-shadow: 0 4px 14px rgba(123,47,190,0.08);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    font-family: 'Heebo', sans-serif;
    position: relative; overflow: hidden;
  }
  .answer-btn:hover:not(:disabled) {
    transform: translateY(-4px) scale(1.04);
    border-color: var(--primary);
    box-shadow: 0 8px 24px rgba(255,107,53,0.2);
    background: #fff8f5;
  }
  .answer-btn:active:not(:disabled) { transform: scale(0.96); }
  .answer-btn .letter-big {
    font-size: 2.4rem; font-weight: 900; color: var(--secondary); line-height: 1;
  }
  .answer-btn .word-label { font-size: 1.1rem; color: #444; }
  .answer-btn .emoji-label { font-size: 1.6rem; }
  .answer-btn .sound-icon { font-size: 1rem; color: #aaa; }

  .answer-btn.correct {
    background: #e8f5e9 !important; border-color: #4CAF50 !important;
    animation: correctPop 0.5s ease;
  }
  .answer-btn.wrong {
    background: #ffebee !important; border-color: #E53935 !important;
    animation: shake 0.4s ease;
  }
  .answer-btn.disabled-opt { opacity: 0.45; pointer-events: none; }
  @keyframes correctPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    60% { transform: translateX(8px); }
  }

  /* Feedback overlay */
  .feedback-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    z-index: 999; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  .feedback-overlay.show { opacity: 1; }
  .feedback-msg {
    font-size: 3.5rem; font-weight: 900;
    padding: 20px 40px; border-radius: 30px;
    text-align: center; pointer-events: none;
    animation: feedbackPop 0.5s cubic-bezier(.68,-0.55,.27,1.55);
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  }
  .feedback-msg.correct { background: #e8f5e9; color: #2e7d32; border: 4px solid #4CAF50; }
  .feedback-msg.wrong { background: #ffebee; color: #c62828; border: 4px solid #E53935; }
  @keyframes feedbackPop {
    0% { transform: scale(0.5) rotate(-10deg); }
    70% { transform: scale(1.1) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* Confetti */
  .confetti-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 998; overflow: hidden;
  }
  .confetti-piece {
    position: absolute; width: 12px; height: 12px; border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Screens */
  .screen { width: 100%; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Start screen */
  .start-screen {
    text-align: center; padding: 30px 20px;
  }
  .start-hero { font-size: 5rem; margin-bottom: 10px; animation: heroFloat 2s ease-in-out infinite; }
  @keyframes heroFloat {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
  }
  .start-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem; color: var(--secondary);
    text-shadow: 3px 3px 0 #ffd700; margin-bottom: 8px;
  }
  .start-desc { font-size: 1.1rem; color: #444; margin-bottom: 24px; line-height: 1.6; }
  .info-cards {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin: 16px 0 28px;
  }
  .info-card {
    background: white; border-radius: 16px; padding: 14px 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    border: 2px solid #f0e6ff;
  }
  .info-card .ic-icon { font-size: 2rem; margin-bottom: 4px; }
  .info-card .ic-text { font-size: 0.85rem; color: #444; font-weight: 700; }

  .start-btn {
    background: linear-gradient(135deg, #FF6B35, #e91e8c);
    color: white; border: none; border-radius: 50px;
    padding: 18px 50px; font-size: 1.5rem; font-weight: 900;
    cursor: pointer; box-shadow: 0 8px 24px rgba(255,107,53,0.4);
    transition: all 0.18s; font-family: 'Fredoka One', cursive;
    letter-spacing: 1px;
  }
  .start-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 12px 32px rgba(255,107,53,0.5); }
  .start-btn:active { transform: scale(0.97); }

  /* End screen */
  .end-screen { text-align: center; padding: 10px 0 30px; }
  .end-hero { font-size: 4rem; margin-bottom: 6px; }
  .end-title {
    font-family: 'Fredoka One', cursive; font-size: 2.4rem; color: var(--secondary);
    text-shadow: 2px 2px 0 #ffd700; margin-bottom: 6px;
  }
  .end-score-big {
    font-size: 3.5rem; font-weight: 900; color: var(--primary);
    margin: 10px 0;
  }
  .end-msg { font-size: 1.1rem; color: #444; margin-bottom: 20px; }

  /* Results table */
  .results-section { width: 100%; margin-top: 16px; }
  .results-title {
    font-size: 1.2rem; font-weight: 900; color: var(--secondary); margin-bottom: 10px; text-align: right;
  }
  .results-table-wrap { overflow-x: auto; border-radius: 16px; box-shadow: var(--shadow); }
  table {
    width: 100%; border-collapse: collapse;
    background: white; border-radius: 16px; overflow: hidden;
    font-size: 0.9rem;
  }
  thead tr { background: linear-gradient(135deg, #7B2FBE, #FF6B35); color: white; }
  th { padding: 12px 8px; text-align: center; font-weight: 700; white-space: nowrap; }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody tr:hover { background: #f3e5ff; }
  td { padding: 10px 8px; text-align: center; border-bottom: 1px solid #f0e6ff; }
  td.correct-cell { color: #2e7d32; font-weight: 700; }
  td.wrong-cell { color: #c62828; font-weight: 700; }

  .summary-cards {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin: 16px 0;
  }
  .sum-card {
    background: white; border-radius: 16px; padding: 14px 8px; text-align: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08); border: 2px solid #f0e6ff;
  }
  .sum-card .sc-val { font-size: 2rem; font-weight: 900; color: var(--secondary); }
  .sum-card .sc-label { font-size: 0.8rem; color: #666; font-weight: 700; }

  .restart-btn {
    background: linear-gradient(135deg, #7B2FBE, #00BCD4);
    color: white; border: none; border-radius: 50px;
    padding: 16px 44px; font-size: 1.3rem; font-weight: 900;
    cursor: pointer; box-shadow: 0 8px 24px rgba(123,47,190,0.3);
    transition: all 0.18s; margin-top: 20px; font-family: 'Fredoka One', cursive;
  }
  .restart-btn:hover { transform: translateY(-3px) scale(1.04); }

  .next-btn {
    margin-top: 14px; background: linear-gradient(135deg, #00BCD4, #7B2FBE);
    color: white; border: none; border-radius: 40px;
    padding: 14px 40px; font-size: 1.2rem; font-weight: 900;
    cursor: pointer; box-shadow: 0 6px 20px rgba(123,47,190,0.25);
    transition: all 0.18s; font-family: 'Fredoka One', cursive;
    display: none;
  }
  .next-btn.visible { display: inline-block; animation: fadeIn 0.3s ease; }
  .next-btn:hover { transform: translateY(-2px) scale(1.04); }

  .attempt-dots {
    display: flex; gap: 6px; justify-content: flex-end; margin-bottom: 10px;
  }
  .dot { width: 13px; height: 13px; border-radius: 50%; background: #e0d0f5; }
  .dot.used { background: #E53935; }

  /* Letter display for end question */
  .letter-options-row .answer-btn .letter-big { font-size: 3rem; }

  @media(max-width:500px) {
    .game-title { font-size: 2rem; }
    .question-text { font-size: 1.2rem; }
    .answer-btn { font-size: 1.1rem; padding: 12px 6px; }
    .answers-grid { gap: 10px; }
    .info-cards { grid-template-columns: 1fr 1fr 1fr; }
    .summary-cards { grid-template-columns: 1fr 1fr 1fr; }
    table { font-size: 0.78rem; }
    th, td { padding: 7px 4px; }
  }
</style>
</head>
<body>

<div class="bg-scene">
  <div class="sun"></div>
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="grass-strip"></div>
</div>

<div class="star" style="top:12%;left:5%;animation-delay:0s">⭐</div>
<div class="star" style="top:20%;left:88%;animation-delay:1s">🌟</div>
<div class="star" style="top:55%;left:3%;animation-delay:2s">✨</div>
<div class="star" style="top:70%;left:92%;animation-delay:0.5s">⭐</div>

<div class="feedback-overlay" id="feedbackOverlay">
  <div class="feedback-msg" id="feedbackMsg"></div>
</div>
<div class="confetti-container" id="confettiContainer"></div>

<div id="app">
  <!-- START SCREEN -->
  <div id="startScreen" class="screen start-screen">
    <div class="start-hero">🦁</div>
    <div class="start-title">משחק האלף-בית!</div>
    <div class="start-desc">
      בוא נלמד את האותיות יחד! <br>
      ענה על 10 שאלות ואסוף כמה שיותר נקודות ⭐
    </div>
    <div class="info-cards">
      <div class="info-card"><div class="ic-icon">❓</div><div class="ic-text">10 שאלות</div></div>
      <div class="info-card"><div class="ic-icon">❤️</div><div class="ic-text">3 לבבות</div></div>
      <div class="info-card"><div class="ic-icon">🏆</div><div class="ic-text">אסוף כוכבים</div></div>
    </div>
    <button class="start-btn" onclick="startGame()">▶ בוא נשחק!</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen" style="display:none; width:100%">
    <div class="game-header">
      <div class="game-title">🌟 אלף-בית 🌟</div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">שאלה 1 מתוך 10</div>
      <div class="lives-row" id="livesRow"></div>
      <div class="score-badge">⭐ ניקוד: <span id="scoreDisplay">0</span></div>
    </div>
    <div id="questionArea" style="width:100%"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">הבא ←</button>
  </div>

  <!-- END SCREEN -->
  <div id="endScreen" class="screen end-screen" style="display:none">
    <div class="end-hero" id="endHero">🏆</div>
    <div class="end-title" id="endTitle">כל הכבוד!</div>
    <div class="end-score-big">⭐ <span id="finalScore">0</span> נקודות</div>
    <div class="end-msg" id="endMsg"></div>
    <div class="summary-cards" id="summaryCards"></div>
    <div class="results-section">
      <div class="results-title">📋 סיכום המשחק המלא</div>
      <div class="results-table-wrap"><table id="resultsTable"></table></div>
    </div>
    <button class="restart-btn" onclick="startGame()">🔄 שחק שוב!</button>
  </div>
</div>

<script>
// ============================================================
//  DATA BANK
// ============================================================
const LETTERS = ['א','ב','ג','ד','ה','ו','ז','ח','ט','י','כ','ל','מ','נ','ס','ע','פ','צ','ק','ר','ש','ת'];
const LETTER_NAMES = {
  'א':'אלף','ב':'בית','ג':'גימל','ד':'דלת','ה':'הא','ו':'וו','ז':'זיין','ח':'חית','ט':'טית','י':'יוד',
  'כ':'כף','ל':'למד','מ':'מם','נ':'נון','ס':'סמך','ע':'עין','פ':'פה','צ':'צדי','ק':'קוף','ר':'ריש','ש':'שין','ת':'תו'
};

// Word bank: each word with emoji and letter
const WORDS = [
  // א
  {w:'אריה',e:'🦁',s:'א',end:'ה'},{w:'ארנב',e:'🐰',s:'א',end:'ב'},{w:'אוטובוס',e:'🚌',s:'א',end:'ס'},
  {w:'אבטיח',e:'🍉',s:'א',end:'ח'},{w:'אננס',e:'🍍',s:'א',end:'ס'},{w:'אפרסק',e:'🍑',s:'א',end:'ק'},
  {w:'אוהל',e:'⛺',s:'א',end:'ל'},{w:'אצבע',e:'👆',s:'א',end:'ע'},{w:'אש',e:'🔥',s:'א',end:'ש'},
  // ב
  {w:'בית',e:'🏠',s:'ב',end:'ת'},{w:'בננה',e:'🍌',s:'ב',end:'ה'},{w:'בלון',e:'🎈',s:'ב',end:'ן'},
  {w:'ברווז',e:'🦆',s:'ב',end:'ז'},{w:'בקבוק',e:'🍶',s:'ב',end:'ק'},{w:'בצל',e:'🧅',s:'ב',end:'ל'},
  {w:'בפגאז',e:'🦋',s:'ב',end:'ז'},{w:'בננה',e:'🍌',s:'ב',end:'ה'},
  // ג
  {w:'גמל',e:'🐪',s:'ג',end:'ל'},{w:'גזר',e:'🥕',s:'ג',end:'ר'},{w:'גשר',e:'🌉',s:'ג',end:'ר'},
  {w:'גביע',e:'🏆',s:'ג',end:'ע'},{w:'גפן',e:'🍇',s:'ג',end:'ן'},{w:'גיטרה',e:'🎸',s:'ג',end:'ה'},
  // ד
  {w:'דג',e:'🐟',s:'ד',end:'ג'},{w:'דוב',e:'🐻',s:'ד',end:'ב'},{w:'דלת',e:'🚪',s:'ד',end:'ת'},
  {w:'דובדבן',e:'🍒',s:'ד',end:'ן'},{w:'דרקון',e:'🐉',s:'ד',end:'ן'},{w:'דגל',e:'🚩',s:'ד',end:'ל'},
  // ה
  {w:'הר',e:'⛰️',s:'ה',end:'ר'},{w:'הליקופטר',e:'🚁',s:'ה',end:'ר'},{w:'הפגר',e:'🌊',s:'ה',end:'ר'},

//  QUESTION GENERATORS

// Type 1: Which word starts with letter X?
function genStartQuestion() {
  // Pick a random word as the correct answer
  const correct = WORDS[Math.floor(Math.random()*WORDS.length)];
  const targetLetter = correct.s;
  // Pick 3 wrong answers: words starting with DIFFERENT letters
  const wrongPool = WORDS.filter(w => w.s !== targetLetter && w.w !== correct.w);
  shuffle(wrongPool);
  const wrongs = wrongPool.slice(0,3);
  const options = shuffle([correct, ...wrongs]);
  return {
    type: 'start',
    typeName: 'מה מתחיל באות',
    question: `מה מתחיל באות <span class="question-word">${targetLetter}</span> ?`,
    options: options.map(o => ({w:o.w, e:o.e, correct: o===correct})),
    correctWord: correct.w,
    targetLetter,
    detail: `האות ${LETTER_NAMES[targetLetter]}`
  };
}

// Type 2: Odd one out - 3 start with same letter, 1 different
function genOddOneOut() {
  // Pick a letter that has at least 3 words
  const letterGroups = {};
  WORDS.forEach(w => { if(!letterGroups[w.s]) letterGroups[w.s]=[]; letterGroups[w.s].push(w); });
  const validLetters = Object.keys(letterGroups).filter(l => letterGroups[l].length >= 3);
  const mainLetter = validLetters[Math.floor(Math.random()*validLetters.length)];
  const mainWords = shuffle([...letterGroups[mainLetter]]).slice(0,3);
  // Pick odd word from a different letter
  const otherLetters = Object.keys(letterGroups).filter(l => l !== mainLetter);
  const oddLetter = otherLetters[Math.floor(Math.random()*otherLetters.length)];
  const oddWord = letterGroups[oddLetter][Math.floor(Math.random()*letterGroups[oddLetter].length)];
  const allOptions = shuffle([...mainWords, oddWord]);
  return {
    type: 'odd',
    typeName: 'מה יוצא דופן',
    question: `🔍 איזו מילה <span class="question-word">לא</span> מתחילה באותה אות?`,
    options: allOptions.map(o => ({w:o.w, e:o.e, correct: o===oddWord})),
    correctWord: oddWord.w,
    mainLetter,
    detail: `המילה ${oddWord.w} מתחילה ב-${oddWord.s}`
  };
}

// Type 3: Which letter does word end with?
function genEndQuestion() {
  const word = WORDS[Math.floor(Math.random()*WORDS.length)];
  const correctLetter = word.end;
  // 3 wrong letters
  const wrongLetters = shuffle(LETTERS.filter(l => l !== correctLetter)).slice(0,3);
  const options = shuffle([correctLetter, ...wrongLetters]);
  return {
    type: 'end',
    typeName: 'באיזה אות מסתיימת',
    question: `באיזו אות מסתיימת המילה <span class="question-word">${word.e} ${word.w}</span>?`,
    options: options.map(l => ({letter:l, correct: l===correctLetter})),
    correctWord: word.w,
    correctLetter,
    detail: `האות ${LETTER_NAMES[correctLetter]}`
  };
}

function generateQuestion() {
  const r = Math.random();
  if (r < 0.4) return genStartQuestion();
  else if (r < 0.7) return genOddOneOut();
  else return genEndQuestion();
}

// ============================================================
//  GAME STATE
// ============================================================
let questions = [], current = 0, lives = 3, score = 0;
let attemptsMade = 0, maxAttempts = 3;
let questionAnswered = false;
let questionResults = []; // {q, type, correct, attempts, word}

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startGame() {
  // Generate 10 unique questions (mix of all types)
  questions = [];
  for(let i=0;i<10;i++) questions.push(generateQuestion());
  current = 0; lives = 3; score = 0; questionResults = [];
  show('gameScreen');
  renderLives();
  renderQuestion();
}

function show(id) {
  ['startScreen','gameScreen','endScreen'].forEach(s=>{
    document.getElementById(s).style.display = s===id ? 'block' : 'none';
  });
}

function renderLives() {
  const row = document.getElementById('livesRow');
  row.innerHTML = '';
  for(let i=0;i<3;i++){
    const h = document.createElement('span');
    h.className = 'heart' + (i >= lives ? ' lost' : '');
    h.textContent = '❤️';
    row.appendChild(h);
  }
}

function renderQuestion() {
  const q = questions[current];
  attemptsMade = 0;
  questionAnswered = false;
  document.getElementById('nextBtn').classList.remove('visible');
  document.getElementById('progressBar').style.width = ((current/10)*100)+'%';
  document.getElementById('progressLabel').textContent = `שאלה ${current+1} מתוך 10`;
  document.getElementById('scoreDisplay').textContent = score;

  const area = document.getElementById('questionArea');
  area.innerHTML = '';

  // Question card
  const card = document.createElement('div');
  card.className = 'question-card';

  // Badge
  const badge = document.createElement('div');
  badge.className = 'q-type-badge ' + (q.type==='start'?'badge-start':q.type==='odd'?'badge-odd':'badge-end');
  badge.textContent = q.type==='start'?'🔤 איזו מילה?' : q.type==='odd'?'🔍 יוצא דופן' : '🔡 איזו אות?';
  card.appendChild(badge);

  // Attempt dots
  const dots = document.createElement('div');
  dots.className = 'attempt-dots'; dots.id = 'attemptDots';
  for(let i=0;i<maxAttempts;i++){
    const d = document.createElement('div'); d.className = 'dot'; dots.appendChild(d);
  }
  card.appendChild(dots);

  // Question text
  const qText = document.createElement('div');
  qText.className = 'question-text';
  qText.innerHTML = q.question;
  card.appendChild(qText);
  area.appendChild(card);

  // Answers
  const grid = document.createElement('div');
  grid.className = 'answers-grid' + (q.type==='end'?' letter-options-row':'');
  grid.id = 'answersGrid';

  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.dataset.idx = idx;

    if(q.type==='end') {
      // Letter answer
      const lb = document.createElement('div'); lb.className='letter-big'; lb.textContent=opt.letter;
      const ln = document.createElement('div'); ln.className='word-label'; ln.textContent=LETTER_NAMES[opt.letter]||opt.letter;
      btn.appendChild(lb); btn.appendChild(ln);
      btn.addEventListener('click', ()=>{ speakLetter(opt.letter); handleAnswer(btn, opt.correct, q); });
    } else {
      // Word answer
      const em = document.createElement('div'); em.className='emoji-label'; em.textContent=opt.e;
      const wl = document.createElement('div'); wl.className='word-label'; wl.textContent=opt.w;
      const si = document.createElement('div'); si.className='sound-icon'; si.textContent='🔊';
      btn.appendChild(em); btn.appendChild(wl); btn.appendChild(si);
      btn.addEventListener('click', ()=>{ speakWord(opt.w); handleAnswer(btn, opt.correct, q); });
    }
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}

function handleAnswer(btn, isCorrect, q) {
  if(questionAnswered) return;
  if(isCorrect) {
    btn.classList.add('correct');
    disableAllBtns();
    questionAnswered = true;
    const pts = Math.max(10, 30 - attemptsMade*10);
    score += pts;
    document.getElementById('scoreDisplay').textContent = score;
    questionResults.push({
      num: current+1,
      type: q.typeName,
      word: q.correctWord||'',
      correct: true,
      attempts: attemptsMade+1,
      detail: q.detail||''
    });
    showFeedback(true);
    launchConfetti();
    setTimeout(()=>{
      document.getElementById('nextBtn').classList.add('visible');
    }, 600);
  } else {
    attemptsMade++;
    btn.classList.add('wrong');
    btn.disabled = true;
    updateDots();
    speakBad();
    if(attemptsMade >= maxAttempts) {
      // Out of attempts for this question
      lives--;
      renderLives();
      disableAllBtns();
      questionAnswered = true;
      questionResults.push({
        num: current+1,
        type: q.typeName,
        word: q.correctWord||'',
        correct: false,
        attempts: attemptsMade,
        detail: q.detail||''
      });
      showFeedback(false);
      setTimeout(()=>{
        document.getElementById('nextBtn').classList.add('visible');
      }, 700);
      if(lives <= 0) {
        setTimeout(endGame, 1800);
      }
    } else {
      showFeedback(false, true); // temporary
    }
  }
}

function updateDots() {
  const dots = document.querySelectorAll('#attemptDots .dot');
  dots.forEach((d,i)=>{ if(i < attemptsMade) d.classList.add('used'); });
}

function disableAllBtns() {
  document.querySelectorAll('#answersGrid .answer-btn').forEach(b=>{ b.disabled=true; b.classList.add('disabled-opt'); });
}

function showFeedback(correct, temporary=false) {
  const overlay = document.getElementById('feedbackOverlay');
  const msg = document.getElementById('feedbackMsg');
  if(correct) {
    const msgs = ['כל הכבוד! 🎉','מעולה! ⭐','וואו! מדהים! 🌟','נכון מאוד! 🏆','גאון! ✨'];
    msg.textContent = msgs[Math.floor(Math.random()*msgs.length)];
    msg.className = 'feedback-msg correct';
  } else {
    if(temporary && attemptsMade < maxAttempts) {
      const msgs = ['נסה שוב! 💪','לא מדויק, נסה עוד פעם! 🤔','כמעט! 😊'];
      msg.textContent = msgs[Math.floor(Math.random()*msgs.length)];
    } else {
      const msgs = ['אופס! לא הצלחת 😢','בפעם הבאה תצליח! 💪','ממשיכים הלאה! 🌈'];
      msg.textContent = msgs[Math.floor(Math.random()*msgs.length)];
    }
    msg.className = 'feedback-msg wrong';
  }
  overlay.classList.add('show');
  setTimeout(()=>overlay.classList.remove('show'), temporary?900:1200);
}

function nextQuestion() {
  current++;
  if(current >= 10 || lives <= 0) { endGame(); return; }
  renderQuestion();
}

function endGame() {
  document.getElementById('progressBar').style.width = '100%';
  show('endScreen');
  buildEndScreen();
}

function buildEndScreen() {
  const pct = Math.round((questionResults.filter(r=>r.correct).length / questionResults.length)*100);
  let hero='🏆', title='כל הכבוד!', msg='';
  if(pct===100){hero='🥇';title='מושלם לגמרי!';msg='ענית נכון על כל השאלות! אתה אלוף האלף-בית! 🌟';}
  else if(pct>=80){hero='🌟';title='עבודה מצוינת!';msg='כמעט מושלם! ממשיכים להתאמן! 💪';}
  else if(pct>=60){hero='😊';title='יפה מאוד!';msg='לא רע כלל! קצת עוד תרגול ותגיע למושלם! 📚';}
  else{hero='💪';title='ממשיכים להתאמן!';msg='אל תוותר! כל תרגול עושה אותך יותר טוב! 🌈';}

  document.getElementById('endHero').textContent = hero;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('endMsg').textContent = msg;

  const correct = questionResults.filter(r=>r.correct).length;
  const wrong = questionResults.filter(r=>!r.correct).length;
  const avgAttempts = questionResults.length ? (questionResults.reduce((s,r)=>s+r.attempts,0)/questionResults.length).toFixed(1) : 0;

  document.getElementById('summaryCards').innerHTML = `
    <div class="sum-card"><div class="sc-val" style="color:#2e7d32">✅ ${correct}</div><div class="sc-label">נכון</div></div>
    <div class="sum-card"><div class="sc-val" style="color:#c62828">❌ ${wrong}</div><div class="sc-label">לא נכון</div></div>
    <div class="sum-card"><div class="sc-val">${pct}%</div><div class="sc-label">הצלחה</div></div>
  `;

  // Table
  const table = document.getElementById('resultsTable');
  table.innerHTML = `
    <thead>
      <tr>
        <th>#</th>
        <th>סוג שאלה</th>
        <th>מילה/אות</th>
        <th>פרט</th>
        <th>תשובה</th>
        <th>מס׳ ניסיונות</th>
        <th>נקודות</th>
      </tr>
    </thead>
    <tbody>
      ${questionResults.map(r=>`
        <tr>
          <td><strong>${r.num}</strong></td>
          <td>${r.type}</td>
          <td><strong>${r.word}</strong></td>
          <td>${r.detail||'-'}</td>
          <td class="${r.correct?'correct-cell':'wrong-cell'}">${r.correct?'✅ נכון':'❌ שגוי'}</td>
          <td>${r.attempts}</td>
          <td>${r.correct ? Math.max(10,30-(r.attempts-1)*10) : 0} ⭐</td>
        </tr>
      `).join('')}
      <tr style="background:#f3e5ff;font-weight:900;">
        <td colspan="4"><strong>סה"כ</strong></td>
        <td><strong>${correct}/${questionResults.length}</strong></td>
        <td><strong>ממוצע: ${avgAttempts}</strong></td>
        <td><strong>${score} ⭐</strong></td>
      </tr>
    </tbody>
  `;
}

// ============================================================
//  SPEECH
// ============================================================
function speak(text) {
  if(!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'he-IL'; u.rate = 0.85; u.pitch = 1.1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
function speakWord(w) { speak(w); }
function speakLetter(l) { speak(LETTER_NAMES[l]||l); }
function speakBad() { /* gentle beep via AudioContext */ try{ const ctx=new AudioContext();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=280;g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);o.start();o.stop(ctx.currentTime+0.25);}catch(e){} }

// ============================================================
//  CONFETTI
// ============================================================
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#FF6B35','#FFD700','#7B2FBE','#00BCD4','#4CAF50','#E91E8C'];
  for(let i=0;i<28;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'%';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.transform = `rotate(${Math.random()*360}deg)`;
    p.style.animationDuration = (1.2+Math.random()*1.5)+'s';
    p.style.animationDelay = Math.random()*0.5+'s';
    p.style.borderRadius = Math.random()>0.5?'50%':'3px';
    container.appendChild(p);
    setTimeout(()=>p.remove(), 3000);
  }
}
